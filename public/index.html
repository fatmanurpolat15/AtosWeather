<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atos — Şehir Hava Durumu Panosu</title>
<meta name="description" content="Birden fazla şehrin canlı hava durumunu takip eden minimalist pastel pano. Bulut bilişim demo projesi." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-1: #f3f0ff;
    --bg-2: #e6f4f1;
    --bg-3: #fdeef2;
    --ink: #2c2a4a;
    --ink-soft: #6b6790;
    --ink-faint: #a6a2c4;
    --card: rgba(255, 255, 255, 0.72);
    --card-border: rgba(255, 255, 255, 0.9);
    --shadow: 0 14px 40px -18px rgba(70, 60, 130, 0.4);
    --shadow-hover: 0 22px 60px -20px rgba(70, 60, 130, 0.55);
    --accent: #8b7bff;
    --accent-soft: #efeaff;
    --mint: #7fd1c1;
    --peach: #f7b8a8;
    --radius: 26px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 800px at 12% -10%, var(--bg-1), transparent 55%),
      radial-gradient(1100px 700px at 100% 0%, var(--bg-3), transparent 50%),
      radial-gradient(900px 900px at 50% 120%, var(--bg-2), transparent 55%),
      #f7f6fc;
    background-attachment: fixed;
    min-height: 100vh;
    padding: 48px 24px 80px;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 1180px; margin: 0 auto; }

  /* ---------- Header ---------- */
  header.app { text-align: center; margin-bottom: 40px; }

  .brand {
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .brand .logo {
    width: 46px; height: 46px; border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--mint));
    display: grid; place-items: center;
    box-shadow: 0 10px 24px -8px rgba(139, 123, 255, 0.7);
    position: relative; overflow: hidden;
  }
  .brand .logo::after {
    content: ""; position: absolute; width: 18px; height: 18px;
    border-radius: 50%; background: #fffdf5;
    top: 9px; left: 9px;
    box-shadow: 12px 12px 0 -2px rgba(255,255,255,0.85), 18px 6px 0 -4px rgba(255,255,255,0.7);
  }
  .brand h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
  .brand h1 span { color: var(--accent); }

  header.app p {
    color: var(--ink-soft); font-size: 15px; font-weight: 500;
    max-width: 480px; margin: 0 auto;
  }

  /* ---------- Controls ---------- */
  .controls {
    display: flex; gap: 12px; flex-wrap: wrap;
    align-items: center; justify-content: center;
    margin: 28px auto 8px; max-width: 640px;
  }
  .search {
    position: relative; flex: 1 1 360px; min-width: 260px;
  }
  .search input {
    width: 100%; border: 1.5px solid rgba(255,255,255,0.9);
    background: var(--card); backdrop-filter: blur(12px);
    border-radius: 18px; padding: 15px 20px 15px 50px;
    font: inherit; font-size: 15px; color: var(--ink);
    box-shadow: var(--shadow); outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search input::placeholder { color: var(--ink-faint); }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .search .ico {
    position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
    color: var(--ink-faint); pointer-events: none;
  }

  .suggestions {
    position: absolute; top: calc(100% + 8px); left: 0; right: 0;
    background: rgba(255,255,255,0.96); backdrop-filter: blur(16px);
    border-radius: 18px; box-shadow: var(--shadow-hover);
    overflow: hidden; z-index: 30; display: none;
    border: 1px solid rgba(255,255,255,0.9);
  }
  .suggestions.show { display: block; }
  .suggestions button {
    display: flex; align-items: center; gap: 12px; width: 100%;
    text-align: left; background: none; border: none; cursor: pointer;
    padding: 13px 18px; font: inherit; color: var(--ink);
    transition: background .15s;
  }
  .suggestions button:hover { background: var(--accent-soft); }
  .suggestions button .pin { color: var(--accent); flex: none; }
  .suggestions button .meta { color: var(--ink-faint); font-size: 13px; margin-left: auto; }

  .unit-toggle {
    display: inline-flex; background: var(--card); backdrop-filter: blur(12px);
    border-radius: 16px; padding: 4px; box-shadow: var(--shadow);
    border: 1.5px solid rgba(255,255,255,0.9);
  }
  .unit-toggle button {
    border: none; background: none; cursor: pointer; font: inherit;
    font-weight: 700; font-size: 14px; color: var(--ink-soft);
    padding: 9px 16px; border-radius: 12px; transition: all .2s;
  }
  .unit-toggle button.active {
    background: linear-gradient(135deg, var(--accent), #a99bff);
    color: #fff; box-shadow: 0 6px 16px -6px rgba(139,123,255,.8);
  }

  /* ---------- Grid ---------- */
  .grid {
    display: grid; gap: 22px; margin-top: 34px;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  }

  .card {
    position: relative; border-radius: var(--radius);
    padding: 24px 24px 20px; overflow: hidden;
    background: var(--card); backdrop-filter: blur(16px);
    border: 1px solid var(--card-border);
    box-shadow: var(--shadow);
    transition: transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s;
    animation: rise .5s cubic-bezier(.2,.8,.2,1) both;
  }
  .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* weather-tinted wash overlay */
  .card .wash {
    position: absolute; inset: 0; opacity: .55; z-index: 0;
    background: linear-gradient(160deg, var(--w1, #eef2ff), transparent 70%);
    pointer-events: none;
  }
  .card > * { position: relative; z-index: 1; }

  .card .remove {
    position: absolute; top: 16px; right: 16px; z-index: 5;
    width: 30px; height: 30px; border-radius: 50%;
    border: none; cursor: pointer; color: var(--ink-soft);
    background: rgba(255,255,255,0.7); display: grid; place-items: center;
    opacity: 0; transform: scale(.8); transition: all .2s;
  }
  .card:hover .remove { opacity: 1; transform: scale(1); }
  .card .remove:hover { background: var(--peach); color: #fff; }

  .card .city { font-size: 19px; font-weight: 700; letter-spacing: -.3px; }
  .card .region { font-size: 13px; color: var(--ink-soft); font-weight: 500; margin-top: 2px; }
  .card .localtime { font-size: 12px; color: var(--ink-faint); font-weight: 600; margin-top: 6px; letter-spacing: .3px; }

  .card .main {
    display: flex; align-items: center; justify-content: space-between;
    margin: 14px 0 6px;
  }
  .card .temp { font-size: 52px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
  .card .temp sup { font-size: 22px; font-weight: 600; top: -16px; color: var(--ink-soft); }
  .card .cond { font-size: 14px; font-weight: 600; color: var(--ink-soft); margin-top: 4px; }

  .card .stats {
    display: flex; gap: 18px; margin-top: 14px; flex-wrap: wrap;
    font-size: 13px; color: var(--ink-soft); font-weight: 600;
  }
  .card .stats div { display: flex; align-items: center; gap: 6px; }
  .card .stats svg { color: var(--accent); flex: none; }

  .card .forecast {
    display: flex; gap: 8px; margin-top: 18px;
    border-top: 1px dashed rgba(108,103,144,.25); padding-top: 16px;
  }
  .fc-day {
    flex: 1; text-align: center; display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .fc-day .d { font-size: 11px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .5px; }
  .fc-day .mini { width: 28px; height: 28px; }
  .fc-day .t { font-size: 12px; font-weight: 700; }
  .fc-day .t span { color: var(--ink-faint); font-weight: 500; }

  /* ---------- Weather icon (animated) ---------- */
  .wicon { width: 74px; height: 74px; flex: none; }
  .sun-core { transform-origin: center; animation: spin 22s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .float { animation: float 4s ease-in-out infinite; transform-origin: center; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  .drop { animation: drop 1.4s linear infinite; }
  .drop.d2 { animation-delay: .45s; }
  .drop.d3 { animation-delay: .9s; }
  @keyframes drop { 0% { transform: translateY(-2px); opacity: 0; } 30% { opacity: 1; } 100% { transform: translateY(10px); opacity: 0; } }
  .flake { animation: flake 2.6s linear infinite; transform-origin: center; }
  .flake.f2 { animation-delay: .8s; }
  .flake.f3 { animation-delay: 1.6s; }
  @keyframes flake { 0% { transform: translateY(-2px) rotate(0); opacity: 0; } 30% { opacity: 1; } 100% { transform: translateY(11px) rotate(180deg); opacity: 0; } }
  .bolt { animation: bolt 2s steps(1) infinite; }
  @keyframes bolt { 0%,70%,100% { opacity: 1; } 75%,85% { opacity: .25; } }

  /* ---------- Skeleton / states ---------- */
  .skeleton { min-height: 240px; }
  .skeleton .bar { background: linear-gradient(90deg, rgba(190,185,220,.18), rgba(190,185,220,.4), rgba(190,185,220,.18)); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 10px; }
  @keyframes shimmer { to { background-position: -200% 0; } }

  .empty {
    grid-column: 1 / -1; text-align: center; padding: 70px 20px;
    color: var(--ink-soft);
  }
  .empty .big { font-size: 46px; margin-bottom: 14px; }
  .empty h3 { font-size: 19px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .empty p { font-size: 14px; }

  .toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 13px 22px; border-radius: 14px;
    font-size: 14px; font-weight: 600; box-shadow: var(--shadow-hover);
    opacity: 0; transition: all .3s; pointer-events: none; z-index: 60;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  footer.app {
    text-align: center; margin-top: 56px; color: var(--ink-faint);
    font-size: 13px; font-weight: 500;
  }
  footer.app .src { color: var(--ink-soft); font-weight: 600; }
  footer.app .badge {
    display: inline-block; margin-left: 8px; padding: 2px 9px; border-radius: 8px;
    background: var(--accent-soft); color: var(--accent); font-size: 11px; font-weight: 700;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="app">
      <div class="brand">
        <div class="logo"></div>
        <h1>Atos<span>.</span></h1>
      </div>
      <p>Sevdiğin şehirleri ekle, hepsinin havasını tek panoda takip et.</p>

      <div class="controls">
        <div class="search">
          <svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
          <input id="cityInput" type="text" placeholder="Şehir ara… (örn. İstanbul, Tokyo, Paris)" autocomplete="off" />
          <div class="suggestions" id="suggestions"></div>
        </div>
        <div class="unit-toggle">
          <button id="btnC" class="active">°C</button>
          <button id="btnF">°F</button>
        </div>
      </div>
    </header>

    <main class="grid" id="grid"></main>

    <footer class="app">
      <span class="src">Atos</span> · Bulut Bilişim Demo · Veri: Open-Meteo
      <span class="badge" id="modeBadge">istemci modu</span>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

<script>
/* ============================================================
   Atos — pastel weather dashboard
   Cloud-computing demo: tries a Netlify serverless function first
   (/.netlify/functions/weather), falls back to direct Open-Meteo.
   ============================================================ */

const GEO_URL = "https://geocoding-api.open-meteo.com/v1/search";
const FX_URL  = "https://api.open-meteo.com/v1/forecast";
const FN_URL  = "/.netlify/functions/weather";

const state = {
  unit: localStorage.getItem("atos.unit") || "c",
  cities: JSON.parse(localStorage.getItem("atos.cities") || "null")
};

const DEFAULTS = [
  { id: 745044, name: "İstanbul", country: "Türkiye", admin1: "İstanbul", latitude: 41.0138, longitude: 28.9497 },
  { id: 323786, name: "Ankara",   country: "Türkiye", admin1: "Ankara",   latitude: 39.9208, longitude: 32.8541 },
  { id: 311046, name: "İzmir",    country: "Türkiye", admin1: "İzmir",    latitude: 38.4192, longitude: 27.1287 }
];
if (!state.cities) state.cities = DEFAULTS;

const $ = (s) => document.querySelector(s);
const grid = $("#grid");
const input = $("#cityInput");
const sugBox = $("#suggestions");

/* ---------- WMO weather code → label + theme ---------- */
function describe(code, isDay = 1) {
  const map = {
    0:  ["Açık",            "clear"],
    1:  ["Çoğunlukla açık", "clear"],
    2:  ["Parçalı bulutlu", "partly"],
    3:  ["Kapalı",          "cloud"],
    45: ["Sisli",           "fog"],
    48: ["Kırağılı sis",    "fog"],
    51: ["Hafif çisenti",   "rain"],
    53: ["Çisenti",         "rain"],
    55: ["Yoğun çisenti",   "rain"],
    56: ["Donlu çisenti",   "rain"],
    57: ["Donlu çisenti",   "rain"],
    61: ["Hafif yağmur",    "rain"],
    63: ["Yağmurlu",        "rain"],
    65: ["Şiddetli yağmur", "rain"],
    66: ["Donan yağmur",    "rain"],
    67: ["Donan yağmur",    "rain"],
    71: ["Hafif kar",       "snow"],
    73: ["Kar yağışlı",     "snow"],
    75: ["Yoğun kar",       "snow"],
    77: ["Kar taneleri",    "snow"],
    80: ["Sağanak",         "rain"],
    81: ["Sağanak yağmur",  "rain"],
    82: ["Şiddetli sağanak","rain"],
    85: ["Kar sağanağı",    "snow"],
    86: ["Yoğun kar sağanağı","snow"],
    95: ["Gök gürültülü",   "storm"],
    96: ["Dolulu fırtına",  "storm"],
    99: ["Şiddetli fırtına","storm"]
  };
  const [label, type] = map[code] || ["Bilinmiyor", "cloud"];
  return { label, type: (type === "clear" && !isDay) ? "clear-night" : type };
}

const THEMES = {
  "clear":       "#fff4d6",
  "clear-night": "#dfe3ff",
  "partly":      "#eaf1ff",
  "cloud":       "#eef0f5",
  "fog":         "#edeef1",
  "rain":        "#dcecf7",
  "snow":        "#eef6fb",
  "storm":       "#e6e3f5"
};

/* ---------- Animated SVG icons ---------- */
function icon(type, size = 74) {
  const cls = size > 40 ? "wicon" : "mini";
  const c = (inner) => `<svg class="${cls}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
  const sun = (cx=32, cy=28, r=11, col="#ffcf5c") => `
    <g class="sun-core">
      ${Array.from({length:8}).map((_,i)=>{const a=i*45*Math.PI/180;const x1=cx+Math.cos(a)*(r+5),y1=cy+Math.sin(a)*(r+5),x2=cx+Math.cos(a)*(r+11),y2=cy+Math.sin(a)*(r+11);return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="3" stroke-linecap="round"/>`}).join("")}
    </g>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}"/>`;
  const moon = `<path class="float" d="M40 18a16 16 0 1 0 8 22 13 13 0 0 1-8-22z" fill="#c3c9ff"/>
    <circle cx="46" cy="20" r="1.6" fill="#e7e9ff"/><circle cx="52" cy="30" r="1.2" fill="#e7e9ff"/><circle cx="44" cy="34" r="1" fill="#e7e9ff"/>`;
  const cloud = (col="#cdd4e6", x=0, y=0) => `<g class="float" transform="translate(${x} ${y})"><path d="M22 42a10 10 0 0 1 .6-19.96A13 13 0 0 1 47 26a9 9 0 0 1-1 16H22z" fill="${col}"/></g>`;
  switch (type) {
    case "clear":       return c(sun());
    case "clear-night": return c(moon);
    case "partly":      return c(sun(24,22,8) + cloud("#dfe4f0", 6, 8));
    case "cloud":       return c(cloud("#cdd4e6") + cloud("#e2e7f2", -6, -6));
    case "fog":         return c(cloud("#d8dbe2") + `<g class="float"><line x1="14" y1="48" x2="50" y2="48" stroke="#c4c8d4" stroke-width="3" stroke-linecap="round"/><line x1="18" y1="54" x2="46" y2="54" stroke="#cfd3de" stroke-width="3" stroke-linecap="round"/></g>`);
    case "rain":        return c(cloud("#bcc6dd") + `<g stroke="#7fb4e6" stroke-width="3" stroke-linecap="round"><line class="drop" x1="24" y1="46" x2="22" y2="52"/><line class="drop d2" x1="32" y1="46" x2="30" y2="52"/><line class="drop d3" x1="40" y1="46" x2="38" y2="52"/></g>`);
    case "snow":        return c(cloud("#cfd6e6") + `<g fill="#9fc4e8"><circle class="flake" cx="24" cy="49" r="2.4"/><circle class="flake f2" cx="32" cy="49" r="2.4"/><circle class="flake f3" cx="40" cy="49" r="2.4"/></g>`);
    case "storm":       return c(cloud("#b3aed6") + `<path class="bolt" d="M32 44l-6 9h5l-3 8 9-12h-5l4-5z" fill="#ffcf5c"/>`);
    default:            return c(cloud());
  }
}

/* ---------- Temperature helpers ---------- */
const toF = (c) => c * 9/5 + 32;
function fmtTemp(c) {
  const v = state.unit === "f" ? toF(c) : c;
  return Math.round(v);
}

/* ---------- Data fetching (serverless-first) ---------- */
let usingServerless = false;
async function getForecast(lat, lon) {
  const params = `latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=4`;
  // Try Netlify serverless function first (cloud computing demo)
  try {
    const r = await fetch(`${FN_URL}?lat=${lat}&lon=${lon}`, { signal: AbortSignal.timeout(4000) });
    if (r.ok) {
      const data = await r.json();
      if (data && data.current) { usingServerless = true; updateBadge(); return data; }
    }
  } catch (_) { /* function not deployed locally → fall back */ }
  // Fallback: call Open-Meteo directly from the browser
  const res = await fetch(`${FX_URL}?${params}`);
  if (!res.ok) throw new Error("Hava durumu alınamadı");
  return res.json();
}

async function searchCities(q) {
  const res = await fetch(`${GEO_URL}?name=${encodeURIComponent(q)}&count=6&language=tr&format=json`);
  if (!res.ok) return [];
  const data = await res.json();
  return data.results || [];
}

function updateBadge() {
  const b = $("#modeBadge");
  if (usingServerless) { b.textContent = "serverless ✓"; b.style.background = "#e3f6f0"; b.style.color = "#2f9e84"; }
}

/* ---------- Time per timezone ---------- */
function localTime(tz) {
  try {
    return new Intl.DateTimeFormat("tr-TR", { hour: "2-digit", minute: "2-digit", timeZone: tz }).format(new Date());
  } catch { return ""; }
}

/* ---------- Render ---------- */
function persist() {
  localStorage.setItem("atos.cities", JSON.stringify(state.cities));
  localStorage.setItem("atos.unit", state.unit);
}

function render() {
  grid.innerHTML = "";
  if (state.cities.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="big">🌤️</div><h3>Henüz şehir yok</h3><p>Yukarıdaki arama kutusundan bir şehir ekleyerek başla.</p></div>`;
    return;
  }
  state.cities.forEach((city, i) => {
    const el = document.createElement("article");
    el.className = "card skeleton";
    el.style.animationDelay = (i * 60) + "ms";
    el.dataset.id = city.id;
    el.innerHTML = `
      <button class="remove" title="Kaldır" aria-label="Kaldır">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div class="city">${city.name}</div>
      <div class="region">${[city.admin1, city.country].filter(Boolean).join(", ")}</div>
      <div class="bar" style="height:54px;margin:18px 0 10px;width:60%"></div>
      <div class="bar" style="height:14px;width:40%"></div>`;
    el.querySelector(".remove").addEventListener("click", () => removeCity(city.id));
    grid.appendChild(el);
    loadCard(el, city);
  });
}

async function loadCard(el, city) {
  try {
    const data = await getForecast(city.latitude, city.longitude);
    const cur = data.current;
    const { label, type } = describe(cur.weather_code, cur.is_day);
    const tz = data.timezone;
    const wash = THEMES[type] || "#eef0f5";

    const days = (data.daily?.time || []).slice(1, 4).map((d, k) => {
      const idx = k + 1;
      const dd = new Date(d + "T00:00:00");
      const name = dd.toLocaleDateString("tr-TR", { weekday: "short" });
      const desc = describe(data.daily.weather_code[idx], 1);
      const hi = fmtTemp(data.daily.temperature_2m_max[idx]);
      const lo = fmtTemp(data.daily.temperature_2m_min[idx]);
      return `<div class="fc-day"><span class="d">${name}</span>${icon(desc.type, 28)}<span class="t">${hi}°<span> / ${lo}°</span></span></div>`;
    }).join("");

    el.classList.remove("skeleton");
    el.style.setProperty("--w1", wash);
    el.innerHTML = `
      <div class="wash"></div>
      <button class="remove" title="Kaldır" aria-label="Kaldır">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div class="city">${city.name}</div>
      <div class="region">${[city.admin1, city.country].filter(Boolean).join(", ")}</div>
      <div class="localtime">🕒 ${localTime(tz)} yerel saat</div>
      <div class="main">
        <div>
          <div class="temp">${fmtTemp(cur.temperature_2m)}<sup>°${state.unit === "f" ? "F" : "C"}</sup></div>
          <div class="cond">${label}</div>
        </div>
        ${icon(type, 74)}
      </div>
      <div class="stats">
        <div title="Hissedilen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 14.76V5a2 2 0 1 0-4 0v9.76a4 4 0 1 0 4 0z"/></svg>
          ${fmtTemp(cur.apparent_temperature)}° hissedilen
        </div>
        <div title="Nem">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.7s6 5.5 6 9.8a6 6 0 0 1-12 0c0-4.3 6-9.8 6-9.8z"/></svg>
          %${cur.relative_humidity_2m} nem
        </div>
        <div title="Rüzgar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 8h11a3 3 0 1 0-3-3M3 16h15a3 3 0 1 1-3 3"/></svg>
          ${Math.round(cur.wind_speed_10m)} km/s
        </div>
      </div>
      <div class="forecast">${days}</div>`;
    el.querySelector(".remove").addEventListener("click", () => removeCity(city.id));
  } catch (e) {
    el.classList.remove("skeleton");
    el.innerHTML = `
      <button class="remove" title="Kaldır"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      <div class="city">${city.name}</div>
      <div class="region" style="margin-top:20px;color:var(--peach)">⚠️ Veri yüklenemedi. İnternet bağlantını kontrol et.</div>`;
    el.querySelector(".remove").addEventListener("click", () => removeCity(city.id));
  }
}

/* ---------- City management ---------- */
function addCity(c) {
  if (state.cities.some(x => x.id === c.id)) { toast(`${c.name} zaten ekli`); return; }
  state.cities.push(c);
  persist();
  render();
  toast(`${c.name} eklendi`);
}
function removeCity(id) {
  state.cities = state.cities.filter(c => c.id !== id);
  persist();
  render();
}

/* ---------- Search UX ---------- */
let debounce;
input.addEventListener("input", () => {
  clearTimeout(debounce);
  const q = input.value.trim();
  if (q.length < 2) { sugBox.classList.remove("show"); return; }
  debounce = setTimeout(async () => {
    const results = await searchCities(q);
    if (!results.length) { sugBox.classList.remove("show"); return; }
    sugBox.innerHTML = results.map(r => {
      const region = [r.admin1, r.country].filter(Boolean).join(", ");
      return `<button data-city='${encodeURIComponent(JSON.stringify({id:r.id,name:r.name,country:r.country,admin1:r.admin1,latitude:r.latitude,longitude:r.longitude}))}'>
        <svg class="pin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="2.6"/></svg>
        <span>${r.name}</span><span class="meta">${region}</span></button>`;
    }).join("");
    sugBox.classList.add("show");
    sugBox.querySelectorAll("button").forEach(b => {
      b.addEventListener("click", () => {
        const c = JSON.parse(decodeURIComponent(b.dataset.city));
        addCity(c);
        input.value = ""; sugBox.classList.remove("show");
      });
    });
  }, 250);
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".search")) sugBox.classList.remove("show");
});

/* ---------- Unit toggle ---------- */
$("#btnC").addEventListener("click", () => setUnit("c"));
$("#btnF").addEventListener("click", () => setUnit("f"));
function setUnit(u) {
  state.unit = u; persist();
  $("#btnC").classList.toggle("active", u === "c");
  $("#btnF").classList.toggle("active", u === "f");
  render();
}

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg) {
  const t = $("#toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

/* ---------- Init ---------- */
setUnit(state.unit);
render();
</script>
</body>
</html>
